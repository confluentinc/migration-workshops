# Gateway init state for KCP migration - applied in STEP-2
# Two streaming domains (MSK + CC), two routes:
#   - migration-route (9595): passthrough to MSK (client traffic)
#   - scram-registration-route (9599): swap to CC (SCRAM user registration)
---
apiVersion: platform.confluent.io/v1beta1
kind: Gateway
metadata:
  name: workshop-gateway
  namespace: confluent
spec:
  replicas: 2
  image:
    application: confluentinc/cpc-gateway:1.2.0-1-ubi9
    init: confluentinc/confluent-init-container:3.2.1
  secretStores:
    - name: vault-store
      provider:
        type: Vault
        configSecretRef: vault-config
  streamingDomains:
    - name: source-msk
      type: kafka
      kafkaCluster:
        bootstrapServers:
          - id: SCRAM
            endpoint: SASL_SSL://${MSK_FIRST_BOOTSTRAP}
            tls:
              secretRef: msk-tls
        nodeIdRanges:
          - name: pool-1
            start: 1
            end: 3
    - name: confluent-cloud
      type: kafka
      kafkaCluster:
        bootstrapServers:
          - id: SASL_PLAIN
            endpoint: SASL_SSL://${CC_BOOTSTRAP_SERVERS}
            tls:
              secretRef: cc-tls
        nodeIdRanges:
          - name: pool-1
            start: 0
            end: 100
  routes:
    - name: migration-route
      endpoint: localhost:9595
      brokerIdentificationStrategy:
        type: port
      streamingDomain:
        name: source-msk
        bootstrapServerId: SCRAM
      security:
        auth: passthrough
    - name: scram-registration-route
      endpoint: localhost:9599
      brokerIdentificationStrategy:
        type: port
      streamingDomain:
        name: confluent-cloud
        bootstrapServerId: SASL_PLAIN
      security:
        auth: swap
        secretStore: vault-store
        client:
          authentication:
            type: scram
            scram:
              alterScramCredentials: true
              admin:
                secretRef: scram-admin-credentials
        cluster:
          authentication:
            type: plain
            jaasConfigPassThrough:
              secretRef: plain-jaas
  externalAccess:
    type: loadBalancer
    loadBalancer:
      domain: localhost
